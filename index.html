<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Search · Urlaubsplaner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .topbar { background: white; border-bottom: 1px solid #e5e5e5; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .logo span { color: #1D9E75; }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; border: none; transition: all 0.15s; }
  .btn-primary { background: #1D9E75; color: white; }
  .btn-primary:hover { background: #0F6E56; }
  .btn-outline { background: white; color: #555; border: 1px solid #ddd; }
  .btn-outline:hover { background: #f5f5f5; }
  .btn-sm { padding: 5px 10px; font-size: 13px; }
  .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .section-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .team-card { background: white; border-radius: 12px; padding: 16px; border: 1px solid #eee; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .card-name { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-role { font-size: 12px; color: #888; margin-bottom: 10px; }
  .days-row { display: flex; align-items: baseline; gap: 4px; margin-bottom: 6px; }
  .days-num { font-size: 22px; font-weight: 700; }
  .days-of { font-size: 12px; color: #888; }
  .bar { height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  .cal-wrap { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; margin-bottom: 2rem; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #eee; }
  .cal-month { font-size: 15px; font-weight: 600; }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 16px; color: #555; }
  .nav-btn:hover { background: #f5f5f5; }
  .cal-scroll { overflow-x: auto; }
  .cal-table { border-collapse: collapse; width: 100%; }
  .cal-table th, .cal-table td { border: none; }
  .name-col { width: 130px; min-width: 130px; padding: 8px 14px; font-size: 13px; font-weight: 500; color: #555; background: #fafafa; border-right: 1px solid #eee; white-space: nowrap; }
  .name-col.header { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  .day-th { width: 30px; min-width: 30px; text-align: center; padding: 6px 2px; font-size: 10px; color: #aaa; font-weight: 500; border-bottom: 1px solid #eee; }
  .day-th.weekend { background: #fafafa; }
  .day-th.today-col { color: #1D9E75; font-weight: 700; }
  .day-num { font-size: 11px; font-weight: 600; display: block; }
  .day-td { width: 30px; min-width: 30px; height: 34px; text-align: center; padding: 0 1px; position: relative; }
  .day-td.weekend { background: #fafafa; }
  .vac-block { position: absolute; inset: 4px 0; border-radius: 2px; }
  .vac-block.s { border-radius: 3px 0 0 3px; left: 3px; }
  .vac-block.e { border-radius: 0 3px 3px 0; right: 3px; }
  .vac-block.se { border-radius: 3px; left: 3px; right: 3px; }
  .today-dot { width: 5px; height: 5px; background: #1D9E75; border-radius: 50%; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); }
  .cal-row-person td { border-top: 1px solid #f0f0f0; }
  .name-cell-inner { display: flex; align-items: center; gap: 8px; }
  .av-sm { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; }

  .upcoming-wrap { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
  .upcoming-header { padding: 14px 18px; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
  .upcoming-item { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #f5f5f5; }
  .upcoming-item:last-child { border-bottom: none; }
  .up-name { font-size: 14px; font-weight: 500; min-width: 110px; }
  .up-dates { font-size: 13px; color: #666; flex: 1; }
  .up-days { font-size: 12px; background: #f5f5f5; border-radius: 6px; padding: 3px 10px; color: #555; }
  .up-del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; padding: 2px 6px; }
  .up-del:hover { color: #e24b4a; }
  .empty-state { padding: 24px 18px; font-size: 14px; color: #aaa; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 50; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 24px; width: 360px; max-width: 95vw; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: #666; margin-bottom: 4px; display: block; }
  .form-group select, .form-group input { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: white; color: #1a1a1a; outline: none; }
  .form-group select:focus, .form-group input:focus { border-color: #1D9E75; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions .btn-cancel { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; color: #555; }
  .modal-actions .btn-save { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: 500; }

  .manage-member { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .manage-member:last-child { border-bottom: none; }
  .manage-info { flex: 1; }
  .manage-name { font-size: 14px; font-weight: 500; }
  .manage-role { font-size: 12px; color: #888; }
  .days-input { width: 60px; padding: 5px 8px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
  .add-section { border-top: 1px solid #eee; margin-top: 16px; padding-top: 16px; }
  .add-section-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #555; }
  .live-dot { width: 8px; height: 8px; background: #1D9E75; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; margin-right: 6px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .live-label { font-size: 12px; color: #888; display: flex; align-items: center; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 10px 18px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Rocket<span>Search</span> · Urlaub</div>
  <div class="topbar-right">
    <span class="live-label"><span class="live-dot"></span>Live</span>
    <button class="btn btn-outline btn-sm" onclick="openManage()">&#128100; Team verwalten</button>
    <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Urlaub eintragen</button>
  </div>
</div>

<div class="main">
  <div class="section-title">Urlaubstage 2025</div>
  <div class="team-grid" id="teamGrid"></div>

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem;">
    <div class="section-title" style="margin-bottom:0;">Kalender</div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <span id="monthLabel" style="font-size:14px; font-weight:600; min-width:140px; text-align:center;"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="cal-scroll">
      <table class="cal-table" id="calTable"></table>
    </div>
  </div>

  <div class="section-title">Geplante Urlaube</div>
  <div class="upcoming-wrap" id="upcomingWrap"></div>
</div>

<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-title">&#127958; Urlaub eintragen</div>
    <div class="form-group">
      <label class="form-label">Person</label>
      <select id="addPerson"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Von</label>
      <input type="date" id="addFrom">
    </div>
    <div class="form-group">
      <label class="form-label">Bis (inkl.)</label>
      <input type="date" id="addTo">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">Abbrechen</button>
      <button class="btn-save" onclick="saveVacation()">Speichern</button>
    </div>
  </div>
</div>

<div class="overlay" id="manageOverlay">
  <div class="modal" style="width:420px;">
    <div class="modal-title">&#128100; Team verwalten</div>
    <div id="manageList"></div>
    <div class="add-section">
      <div class="add-section-title">Person hinzufügen</div>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" id="newName" placeholder="z. B. Lisa Müller">
      </div>
      <div class="form-group">
        <label class="form-label">Rolle</label>
        <input type="text" id="newRole" placeholder="z. B. Recruiting">
      </div>
      <div class="form-group">
        <label class="form-label">Urlaubstage pro Jahr</label>
        <input type="number" id="newDays" value="28" min="1" max="40">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">Schließen</button>
      <button class="btn-save" onclick="addMember()">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://wwspotfokuznhfjfctsa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3c3BvdGZva3V6bmhmamZjdHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODEwMjgsImV4cCI6MjA5NTQ1NzAyOH0.PPNjmQLSRSk7gs543un5K6hECMhUCp7iWAvZEBVM0IU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const COLORS = [
  { bg:'#E1F5EE', text:'#0F6E56', fill:'#1D9E75' },
  { bg:'#E6F1FB', text:'#185FA5', fill:'#378ADD' },
  { bg:'#FAEEDA', text:'#854F0B', fill:'#EF9F27' },
  { bg:'#EEEDFE', text:'#3C3489', fill:'#7F77DD' },
  { bg:'#FAECE7', text:'#993C1D', fill:'#D85A30' },
];

let team = [], vacations = [];
let curYear = new Date().getFullYear(), curMonth = new Date().getMonth();

async function load() {
  const [{ data: t }, { data: v }] = await Promise.all([
    sb.from('team').select('*').order('id'),
    sb.from('vacations').select('*').order('from_date')
  ]);
  team = t || [];
  vacations = v || [];
  renderAll();
}

function initRealtime() {
  sb.channel('changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'team' }, () => load())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'vacations' }, () => load())
    .subscribe();
}

function getWorkdays(from, to) {
  let count = 0, d = new Date(from);
  while (d <= to) { const day = d.getDay(); if (day !== 0 && day !== 6) count++; d.setDate(d.getDate()+1); }
  return count;
}

function getUsedDays(personId) {
  const year = new Date().getFullYear();
  let used = 0;
  vacations.filter(v => v.person_id === personId).forEach(v => {
    const from = new Date(v.from_date), to = new Date(v.to_date);
    if (from.getFullYear() === year || to.getFullYear() === year) {
      const s = new Date(Math.max(from, new Date(year,0,1)));
      const e = new Date(Math.min(to, new Date(year,11,31)));
      if (s <= e) used += getWorkdays(s, e);
    }
  });
  return used;
}

function initials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }
function fmtDate(str) { return new Date(str).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); }

function renderAll() {
  renderTeam(); renderCalendar(); renderUpcoming();
  const d = new Date(curYear, curMonth, 1);
  document.getElementById('monthLabel').textContent = d.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
}

function renderTeam() {
  document.getElementById('teamGrid').innerHTML = team.map(p => {
    const used = getUsedDays(p.id), left = Math.max(0, p.total_days - used);
    const pct = Math.round((left / p.total_days) * 100);
    const c = COLORS[p.color % COLORS.length];
    return `<div class="team-card">
      <div class="avatar" style="background:${c.bg};color:${c.text};">${initials(p.name)}</div>
      <div class="card-name" title="${p.name}">${p.name}</div>
      <div class="card-role">${p.role||''}</div>
      <div class="days-row"><span class="days-num" style="color:${c.fill};">${left}</span><span class="days-of">/ ${p.total_days} Tage</span></div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${c.fill};"></div></div>
    </div>`;
  }).join('');
}

function renderCalendar() {
  const days = new Date(curYear, curMonth+1, 0).getDate();
  const today = new Date();
  const dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  let html = '<thead><tr><th class="name-col header">Person</th>';
  for (let d=1; d<=days; d++) {
    const dow = new Date(curYear,curMonth,d).getDay();
    const isWe = dow===0||dow===6;
    const isToday = today.getDate()===d && today.getMonth()===curMonth && today.getFullYear()===curYear;
    html += `<th class="day-th${isWe?' weekend':''}${isToday?' today-col':''}"><span>${dayNames[dow]}</span><span class="day-num">${d}</span></th>`;
  }
  html += '</tr></thead><tbody>';

  team.forEach(p => {
    const c = COLORS[p.color % COLORS.length];
    const pvacs = vacations.filter(v => v.person_id === p.id);
    html += `<tr class="cal-row-person"><td class="name-col"><div class="name-cell-inner"><div class="av-sm" style="background:${c.bg};color:${c.text};">${initials(p.name)}</div>${p.name.split(' ')[0]}</div></td>`;
    for (let d=1; d<=days; d++) {
      const cur = new Date(curYear,curMonth,d); cur.setHours(0,0,0,0);
      const dow = cur.getDay(); const isWe = dow===0||dow===6;
      const isToday = today.getDate()===d && today.getMonth()===curMonth && today.getFullYear()===curYear;
      let block = '';
      pvacs.forEach(v => {
        const from = new Date(v.from_date); from.setHours(0,0,0,0);
        const to = new Date(v.to_date); to.setHours(0,0,0,0);
        if (cur >= from && cur <= to) {
          const isS = cur.getTime()===from.getTime(), isE = cur.getTime()===to.getTime();
          const cls = isS&&isE?'se':isS?'s':isE?'e':'';
          block = `<div class="vac-block${cls?' '+cls:''}" style="background:${c.fill};opacity:0.75;" title="${p.name}: ${fmtDate(v.from_date)} – ${fmtDate(v.to_date)}"></div>`;
        }
      });
      html += `<td class="day-td${isWe?' weekend':''}">${block}${isToday&&!block?'<div class="today-dot"></div>':''}</td>`;
    }
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('calTable').innerHTML = html;
}

function renderUpcoming() {
  const today = new Date(); today.setHours(0,0,0,0);
  const all = vacations.map(v => ({
    ...v, fromD: new Date(v.from_date), toD: new Date(v.to_date),
    person: team.find(p => p.id === v.person_id)
  })).filter(v => v.toD >= today && v.person).sort((a,b) => a.fromD-b.fromD);

  const wrap = document.getElementById('upcomingWrap');
  if (!all.length) { wrap.innerHTML = '<div class="empty-state">Keine geplanten Urlaube eingetragen.</div>'; return; }
  wrap.innerHTML = all.map(v => {
    const c = COLORS[v.person.color % COLORS.length];
    const wd = getWorkdays(v.fromD, v.toD);
    return `<div class="upcoming-item">
      <div class="av-sm" style="background:${c.bg};color:${c.text};width:28px;height:28px;font-size:10px;">${initials(v.person.name)}</div>
      <span class="up-name">${v.person.name}</span>
      <span class="up-dates">${fmtDate(v.from_date)} – ${fmtDate(v.to_date)}</span>
      <span class="up-days">${wd} Arbeitstage</span>
      <button class="up-del" onclick="deleteVacation(${v.id})" title="Löschen">&#215;</button>
    </div>`;
  }).join('');
}

function openAdd() {
  document.getElementById('addPerson').innerHTML = team.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  const t = new Date().toISOString().split('T')[0];
  document.getElementById('addFrom').value = t;
  document.getElementById('addTo').value = t;
  document.getElementById('addOverlay').classList.add('open');
}

async function saveVacation() {
  const person_id = parseInt(document.getElementById('addPerson').value);
  const from_date = document.getElementById('addFrom').value;
  const to_date = document.getElementById('addTo').value;
  if (!from_date || !to_date || from_date > to_date) { alert('Bitte gültige Daten eingeben.'); return; }
  const { error } = await sb.from('vacations').insert({ person_id, from_date, to_date });
  if (error) { alert('Fehler: ' + error.message); return; }
  closeModals(); showToast('Urlaub eingetragen ✓');
}

async function deleteVacation(id) {
  if (!confirm('Urlaub löschen?')) return;
  await sb.from('vacations').delete().eq('id', id);
  showToast('Urlaub gelöscht');
}

function openManage() {
  renderManageList();
  document.getElementById('manageOverlay').classList.add('open');
}

function renderManageList() {
  document.getElementById('manageList').innerHTML = team.map(p => {
    const c = COLORS[p.color % COLORS.length];
    return `<div class="manage-member">
      <div class="av-sm" style="background:${c.bg};color:${c.text};width:32px;height:32px;font-size:12px;">${initials(p.name)}</div>
      <div class="manage-info"><div class="manage-name">${p.name}</div><div class="manage-role">${p.role||''}</div></div>
      <input type="number" class="days-input" value="${p.total_days}" min="1" max="60" onchange="updateDays(${p.id},this.value)">
      <span style="font-size:12px;color:#888;">Tage</span>
      ${team.length>1?`<button class="up-del" onclick="removeMember(${p.id})">&#215;</button>`:''}
    </div>`;
  }).join('');
}

async function updateDays(id, val) {
  await sb.from('team').update({ total_days: parseInt(val)||28 }).eq('id', id);
  showToast('Urlaubstage aktualisiert ✓');
}

async function removeMember(id) {
  if (!confirm('Person und alle Urlaube löschen?')) return;
  await sb.from('team').delete().eq('id', id);
  showToast('Person entfernt');
}

async function addMember() {
  const name = document.getElementById('newName').value.trim();
  const role = document.getElementById('newRole').value.trim();
  const total_days = parseInt(document.getElementById('newDays').value)||28;
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  const color = team.length % COLORS.length;
  const { error } = await sb.from('team').insert({ name, role, total_days, color });
  if (error) { alert('Fehler: ' + error.message); return; }
  document.getElementById('newName').value='';
  document.getElementById('newRole').value='';
  document.getElementById('newDays').value=28;
  showToast('Person hinzugefügt ✓');
}

function closeModals() { document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open')); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) closeModals(); }));

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth>11){curMonth=0;curYear++;} if (curMonth<0){curMonth=11;curYear--;}
  renderAll();
}

load();
initRealtime();
</script>
</body>
</html>
